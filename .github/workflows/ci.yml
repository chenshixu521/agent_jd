name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-test:
    name: Java tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-jd-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B -ntp test

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-jd-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            agent-jd-python/requirements.txt
            agent-jd-python/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-jd-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-jd-web/package-lock.json
      - run: npm ci
      - run: npm run build

  compose-config:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [java-test, python-test, web-build, compose-config]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: java
            context: agent-jd-java
          - service: python
            context: agent-jd-python
          - service: web
            context: agent-jd-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: agent-jd-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
