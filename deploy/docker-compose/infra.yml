name: agent-jd

services:
  mysql:
    image: mysql:8.0
    container_name: agent-jd-mysql
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: agent_jd
      MYSQL_DATABASE: agent_jd
    ports:
      - "3306:3306"
    volumes:
      - agent-jd-mysql-data:/var/lib/mysql
      - ../sql/java-backend-init.sql:/docker-entrypoint-initdb.d/01-agent-jd.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pagent_jd"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: agent-jd-redis
    ports:
      - "6379:6379"
    volumes:
      - agent-jd-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  agent-jd-mysql-data:
  agent-jd-redis-data:
