name: resume_optimize
version: v1
description: 基于简历与 JD 生成优化建议
inputs:
  - name: resume_text
    type: string
    required: true
  - name: jd_text
    type: string
    required: true
  - name: match
    type: object
    required: false
  - name: examples
    type: list
    required: false
  - name: rag_context
    type: string
    required: false
model:
  temperature: 0.3
messages:
  - role: system
    template: |
      你是资深 HR、技术面试官和 AI 求职顾问。必须基于用户事实提出建议，不得编造经历。回答要精炼，优先输出可执行建议。
  - role: user
    template: |
      ## 简历核心内容
      {{ resume_text }}

      ## 目标岗位 JD
      {{ jd_text }}

      ## 匹配分析
      {{ match }}

      ## RAG 参考
      {{ rag_context }}

      ## 参考片段
      {% for item in examples %}
      - {{ item }}
      {% endfor %}

      请直接输出 Markdown，控制在 600 字以内，包含：
      1. 匹配总结
      2. 简历优化建议
      3. 技能补强建议
      4. 项目描述优化方向。
