global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: agent-jd-java
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["java:8080"]

  - job_name: agent-jd-python
    metrics_path: /metrics
    static_configs:
      - targets: ["python:8000"]
