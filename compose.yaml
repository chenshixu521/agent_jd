name: agent-jd

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-agent_jd_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent_jd}
      MYSQL_USER: ${MYSQL_USER:-agent_jd}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agent_jd}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/sql/java-backend-init.sql:/docker-entrypoint-initdb.d/01-agent-jd.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging: *default-logging

  python:
    build:
      context: ./agent-jd-python
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    image: agent-jd-python:local
    restart: unless-stopped
    init: true
    environment:
      APP_ENV: docker
      INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:-replace-with-shared-internal-token}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-180}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-sentence_transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-512}
      FAISS_DIR: /app/data/faiss_index
      PROMPT_DIR: /app/app/prompts/templates
      RAG_RRF_K: ${RAG_RRF_K:-60}
      IMPORT_SEED_DATA: ${IMPORT_SEED_DATA:-true}
      HF_HOME: /models/huggingface
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - faiss-data:/app/data/faiss_index
      - huggingface-cache:/models/huggingface
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m
    logging: *default-logging

  java:
    build:
      context: ./agent-jd-java
    image: agent-jd-java:local
    restart: unless-stopped
    init: true
    environment:
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agent_jd}
      MYSQL_USER: ${MYSQL_USER:-agent_jd}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agent_jd}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-byte-random-secret}
      AGENT_BASE_URL: http://python:8000
      AGENT_INTERNAL_TOKEN: ${AGENT_INTERNAL_TOKEN:-replace-with-shared-internal-token}
      AGENT_CONNECT_TIMEOUT_MS: ${AGENT_CONNECT_TIMEOUT_MS:-3000}
      AGENT_RESPONSE_TIMEOUT_MS: ${AGENT_RESPONSE_TIMEOUT_MS:-180000}
      AGENT_MAX_RETRY: ${AGENT_MAX_RETRY:-2}
      AGENT_TASK_QUEUE_ENABLED: ${AGENT_TASK_QUEUE_ENABLED:-true}
      AGENT_TASK_STREAM_KEY: ${AGENT_TASK_STREAM_KEY:-ai:task:queue}
      AGENT_TASK_DLQ_KEY: ${AGENT_TASK_DLQ_KEY:-ai:task:dlq}
      AGENT_TASK_GROUP: ${AGENT_TASK_GROUP:-agent-jd-worker}
      AGENT_TASK_MAX_ATTEMPTS: ${AGENT_TASK_MAX_ATTEMPTS:-3}
      AGENT_TASK_RETRY_DELAY: ${AGENT_TASK_RETRY_DELAY:-15s}
      AGENT_TASK_CLAIM_IDLE: ${AGENT_TASK_CLAIM_IDLE:-10m}
      STORAGE_ROOT: /app/data/uploads
      STORAGE_PUBLIC_BASE_URL: /api/files/download
    volumes:
      - uploads-data:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      python:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    logging: *default-logging

  web:
    build:
      context: ./agent-jd-web
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
    image: agent-jd-web:local
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      java:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging: *default-logging

volumes:
  mysql-data:
  redis-data:
  uploads-data:
  faiss-data:
  huggingface-cache:
